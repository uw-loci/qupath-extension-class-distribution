# Extension metadata
name=Class Distribution
description=Live pie chart of annotation class distribution across a QuPath project. Filter by ImageType, sum closed annotations by area and polylines by length, and watch the chart update as you annotate.

# Menu items
menu.show=Show Class Distribution...
tooltip.menu.show=Open a live pie chart of annotation class distribution across the project.

# Dialog title
dialog.title=Class Distribution

# Top-bar controls
label.imageType=Image type:
label.repollProject=Refresh from project
label.repollProgress=Refreshing %d/%d...
label.repollCancel=Cancel
label.repollCancelled=Refresh cancelled
tooltip.imageType=Filter the chart to images of this type. Defaults to the open image's type, or to the most common type in the project.
tooltip.repoll=Re-walk every image in the project. Use this after a script or external workflow has changed annotations on images other than the one open in the viewer.
tooltip.repollCancel=Stop the refresh. The chart will keep whichever images were loaded before you cancelled.

# Image-type combo entries (UI vocabulary, not the QuPath enum names)
imagetype.allTypes=All types
imagetype.unset=Unset

# Dirty-image banner
banner.dirty=Displayed distribution reflects unsaved changes to this image.
banner.saveButton=Save image to project
tooltip.banner.dirty=This image has unsaved changes. The chart shows the live hierarchy; save to make the displayed distribution match what is on disk.
tooltip.banner.saveButton=Save the open image to its project entry so the chart reflects what is stored on disk.
banner.save.noProject=Open the image inside a QuPath project to save from this banner.
banner.save.notInProject=The open image is not part of the current project; cannot save.
banner.save.failed=Save failed; see the QuPath log for details.
banner.noImage=No image is open. The chart reflects the last full project refresh.

# Chart
tooltip.chart=Each slice is one annotation class. Slice size is the total area of closed annotations plus polyline length times the configured polyline width, summed across the filtered images.
tooltip.legend=Same data as the chart; useful when many slices make on-chart labels hard to read.
slice.unclassifiedLabel=Unclassified
tooltip.slice.unclassified=Annotations with no class assigned. Re-classify these in QuPath's main viewer to move them out of this bucket.
# Per-slice hover format. Substituted at runtime via String.format with arguments:
#   1$s = class name
#   2$d = annotation count
#   3$.0f = total area or length-equivalent in pixel-equivalents
#   4$.1f = percent
# Unit "px-equivalent" reflects that closed annotations contribute area in
# pixel squares while polylines contribute length * width in pixel
# squares; either way the unit is comparable across slices.
slice.hoverFormat=%1$s: %2$,d objects, %3$,.0f px-equivalent (%4$.1f%%)

# Advanced section
section.advanced=Advanced
tooltip.advanced=Open advanced settings: polyline width, highlight threshold, and label visibility.
label.polylineWidth=Treat polylines as
label.polylineWidthSuffix=pixels wide
tooltip.polylineWidth=Treat polyline annotations as if they were this many pixels wide. Their contribution to the chart is line length times this value. Common values: 1 (default; treats polylines as single-pixel lines), 5 (matches the default brush width in the QuPath DL Pixel Classifier extension). Set to whatever your training pipeline uses to rasterize polylines.
label.threshold=Highlight slices >=
label.thresholdSuffix=pp above/below median
tooltip.threshold=Highlight a class when its share of total differs from the median class share by at least this many percentage points (pp). Lower values flag more classes; higher values only flag clear outliers. Default 15 pp.
label.overColor=Over:
label.underColor=Under:
tooltip.overColor=Colour used to mark over-represented classes. Default is Okabe-Ito blue (colourblind-safe). Pick a different hue if it is hard to distinguish on your display.
tooltip.underColor=Colour used to mark under-represented classes. Default is Okabe-Ito vermilion (colourblind-safe). Pick a different hue if it is hard to distinguish on your display.
label.showSliceLabels=Show slice labels on chart
label.showSliceLabelsHint=auto-off if >10 slices
tooltip.showSliceLabels=Show the percent label on each slice. Turned off automatically when there are more than ten classes; the legend below the chart still shows everything.

# Status bar
status.summaryFormat=%,d annotations across %,d images.
status.lastPolledFormat=Last refreshed %s
status.lastPolledNever=Not refreshed yet
tooltip.status.summary=Total annotations and images contributing to the chart at the current image-type filter.
tooltip.status.lastPolled=Time of the last full project refresh. Annotations on the open image update live and do not require a refresh.

# Empty / edge states
empty.noProject=Open a project to see class distribution.
empty.noMatchingImages=No images of type {0} in this project. Pick a different Image Type above.
empty.noAnnotations=No annotations to display. Draw and classify some annotations to see the chart.
empty.liveUpdateFailed=Live update failed; press Refresh from project to update.

# Error / warning notifications
notify.repollFailedTitle=Class Distribution
notify.repollFailedBody=Refresh failed. See the QuPath log for details.
